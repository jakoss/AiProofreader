services:
  proofreader-web:
    build: ./proofreader-web
    ports:
      - "3000:3000"
    environment:
      MODEL_PROVIDER_BASE_URL: http://bifrost-gateway:8080/v1
      MODEL_PROVIDER_MODEL: ${MODEL_PROVIDER_MODEL:?Set MODEL_PROVIDER_MODEL to the model id to use}
      NODE_ENV: production
    depends_on:
      - bifrost-gateway

  bifrost-gateway:
    image: maximhq/bifrost:latest
    ports:
      - "8080:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    volumes:
      - bifrost-gateway-data:/app/data

volumes:
  bifrost-gateway-data:
